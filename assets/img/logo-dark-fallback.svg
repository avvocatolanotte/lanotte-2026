      .ampersand{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:500;font-style:italic;font-size:160px}
      .subtitle{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:500;font-size:24px;letter-spacing:10px}
