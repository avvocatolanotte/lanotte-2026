<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" role="img" aria-label="SSD Federico II di Svevia - Centro Sportivo">
  <defs>
    <style>
      .navy{fill:#1d2c4a}
      .gold{fill:#b89968}
      .text-main{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:700;font-size:32px;letter-spacing:0.5px}
      .text-sub{font-family:'Inter','Helvetica Neue',sans-serif;font-weight:600;font-size:10px;letter-spacing:3px}
      .text-tag{font-family:'Inter','Helvetica Neue',sans-serif;font-weight:500;font-size:11px;letter-spacing:2px}
    </style>
  </defs>
  <rect x="6" y="6" width="308" height="148" fill="none" stroke="#1d2c4a" stroke-width="1.5"/>
