<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" role="img" aria-label="Lanotte and Partners - Studio Legale">
  <defs>
    <style>
      .navy{fill:#1d2c4a}
      .gold{fill:#b89968}
      .wordmark{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:600;font-size:108px;letter-spacing:-1px}
      .ampersand{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:500;font-style:italic;font-size:160px}
      .subtitle{font-family:'Cormorant Garamond','Times New Roman','Georgia',serif;font-weight:500;font-size:24px;letter-spacing:10px}
    </style>
  </defs>

  <!-- Wordmark "Lanotte" -->
  <text x="20" y="125" class="navy wordmark">Lanotte</text>

  <!-- Ampersand stilizzata (gold dietro + navy davanti per effetto layered) -->
  <text x="378" y="148" class="gold ampersand">&amp;</text>
  <text x="380" y="142" class="navy ampersand" style="opacity:.92">&amp;</text>

  <!-- Wordmark "Partners" -->
  <text x="480" y="125" class="navy wordmark">Partners</text>

  <!-- Linee decorative oro con fleurons + sottotitolo STUDIO LEGALE -->
  <line x1="180" y1="180" x2="350" y2="180" stroke="#b89968" stroke-width="1.8"/>
  <g transform="translate(357,180)" class="gold">
    <path d="M0 0 L5 -6 L0 -12 L-5 -6 Z M0 0 L5 6 L0 12 L-5 6 Z M-12 0 L-5 -1.5 L-5 1.5 Z M12 0 L5 -1.5 L5 1.5 Z"/>
  </g>
  <text x="380" y="188" class="navy subtitle">STUDIO LEGALE</text>
  <g transform="translate(613,180)" class="gold">
    <path d="M0 0 L5 -6 L0 -12 L-5 -6 Z M0 0 L5 6 L0 12 L-5 6 Z M-12 0 L-5 -1.5 L-5 1.5 Z M12 0 L5 -1.5 L5 1.5 Z"/>
  </g>
  <line x1="620" y1="180" x2="790" y2="180" stroke="#b89968" stroke-width="1.8"/>
</svg>
